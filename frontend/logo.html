<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px;
    height: 512px;
    background: #060a13;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo-wrap {
    position: relative;
    width: 512px;
    height: 512px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Subtle radial glow */
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  /* Shield shape */
  .shield {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .shield-icon {
    width: 180px;
    height: 180px;
    position: relative;
  }
  .shield-icon svg {
    width: 100%;
    height: 100%;
  }
  .text {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -2px;
    color: white;
  }
  .subtext {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 16px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(59,130,246,0.7);
    margin-top: -8px;
  }
</style>
</head>
<body>
  <div class="logo-wrap">
    <div class="glow"></div>
    <div class="shield">
      <div class="shield-icon">
        <svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shield outer -->
          <path d="M90 16L160 48V96C160 132 130 160 90 172C50 160 20 132 20 96V48L90 16Z"
                fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.4)" stroke-width="2"/>
          <!-- Shield inner -->
          <path d="M90 32L144 58V96C144 124 120 148 90 158C60 148 36 124 36 96V58L90 32Z"
                fill="rgba(59,130,246,0.05)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
          <!-- Checkmark -->
          <path d="M65 92L82 109L115 72" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <!-- Dot accents -->
          <circle cx="90" cy="46" r="3" fill="rgba(59,130,246,0.5)"/>
          <circle cx="48" cy="70" r="2" fill="rgba(59,130,246,0.3)"/>
          <circle cx="132" cy="70" r="2" fill="rgba(59,130,246,0.3)"/>
        </svg>
      </div>
      <div class="text">OCL</div>
      <div class="subtext">compliance</div>
    </div>
  </div>
</body>
</html>
